name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # npm ci compiles the better-sqlite3 native addon; build-essential ships
      # on ubuntu-latest so no extra apt install is needed.
      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      # Placeholders keep the build off real secrets/DB (routes are dynamic).
      - name: Build
        run: npm run build
        env:
          SESSION_SECRET: build-time-placeholder-build-time-placeholder
          DATABASE_URL: /tmp/build.db
