name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # npm ci compiles the better-sqlite3 native addon; build-essential ships
      # on ubuntu-latest so no extra apt install is needed.
      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      # Placeholders keep the build off real secrets/DB (routes are dynamic).
      - name: Build
        run: npm run build
        env:
          SESSION_SECRET: build-time-placeholder-build-time-placeholder
          DATABASE_URL: /tmp/build.db

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (chromium + deps)
        run: npx playwright install --with-deps chromium

      # The webserver command (npm run e2e:webserver) wipes + migrates a
      # throwaway SQLite DB, sets a placeholder SESSION_SECRET, and disables the
      # scheduler — no real secrets or network checks needed.
      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # Separate, non-blocking-by-default job: surfaces known vulns without gating
  # merges on transitive advisories (not in the branch-protection required set).
  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: npm audit (high + critical)
        run: npm audit --audit-level=high
