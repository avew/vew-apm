services:
  apm:
    build: .
    image: vew-apm:latest
    container_name: vew-apm
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      # SQLite file on the persistent volume
      DATABASE_URL: /data/apm.db
      # Optional. If unset, the container auto-generates and persists them to
      # the volume on first start. Provide here (via .env) only to pin your own.
      SESSION_SECRET: ${SESSION_SECRET:-}
      CRON_SECRET: ${CRON_SECRET:-}
      # optional
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      # in-process scheduler tick (ms)
      APM_SCHEDULER_TICK_MS: ${APM_SCHEDULER_TICK_MS:-5000}
    volumes:
      - apm-data:/data

volumes:
  apm-data:
